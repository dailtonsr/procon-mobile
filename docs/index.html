<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PRoCon">
<meta name="theme-color" content="#0a0c10">
<title>PRoCon Mobile</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#0a0c10;--surface:#111318;--surface2:#181c24;--border:#252c3a;--accent:#e8a020;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--purple:#a78bfa;--text:#e8ecf4;--text2:#8892a4;--text3:#4a5568;--radius:10px;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100%}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 10px) 14px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.server-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.server-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.server-dot.offline{background:var(--red)}
.server-dot.connecting{background:var(--yellow);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#server-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#player-count{font-size:11px;color:var(--accent);font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.top-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:10px;font-weight:700;padding:4px 8px;cursor:pointer;flex-shrink:0}
#btn-reconnect{display:none;border-color:rgba(234,179,8,.4);color:var(--yellow)}
#content{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;display:none}
.screen.active{display:block}
#bottomnav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bot);flex-shrink:0;overflow-x:auto}
.nav-btn{flex:1;min-width:52px;background:none;border:none;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;font-family:'Inter',sans-serif;font-size:9px;font-weight:500;transition:color .15s;position:relative;white-space:nowrap}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px}
.nav-badge{position:absolute;top:4px;right:calc(50% - 16px);background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 4px;min-width:14px;text-align:center;display:none}
.nav-badge.show{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.field label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:11px 13px;width:100%;outline:none;-webkit-appearance:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
.input-mono{font-family:'JetBrains Mono',monospace;font-size:13px}
.btn-primary{background:var(--accent);border:none;border-radius:var(--radius);color:#000;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;padding:14px;width:100%;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn-primary:active{opacity:.8}
.btn-primary:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
.section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:14px 0 6px}
.logo{text-align:center;padding:16px 0 14px}
.logo-text{font-size:26px;font-weight:700;letter-spacing:-.03em;color:var(--accent)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.saved-servers{display:flex;flex-direction:column;gap:6px}
.saved-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.saved-row:active{border-color:var(--accent)}
.saved-row .sr-name{font-size:13px;font-weight:600;flex:1}
.saved-row .sr-host{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
/* PLAYERS TABLE */
.players-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.players-table{width:100%;border-collapse:collapse;font-size:11px}
.players-table th{background:var(--surface2);color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:7px 8px;text-align:left;cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--border);user-select:none}
.players-table th:hover{color:var(--accent)}
.players-table th.sort-asc::after{content:' ▲'}
.players-table th.sort-desc::after{content:' ▼'}
.players-table td{padding:6px 8px;border-bottom:1px solid rgba(37,44,58,.5);vertical-align:middle;white-space:nowrap}
.players-table tr:active td{background:rgba(232,160,32,.06)}
.players-table tr.team-header-row td{background:var(--surface2);color:var(--blue);font-weight:700;font-size:11px;letter-spacing:.04em;padding:5px 8px}
.players-table tr.team-header-row.team2 td{color:#f87171}
.players-table tr.totals-row td{background:rgba(37,44,58,.4);color:var(--text2);font-size:10px;font-weight:600}
.players-table tr.averages-row td{background:rgba(37,44,58,.2);color:var(--text3);font-size:10px}
.vip-badge{background:rgba(232,160,32,.15);color:var(--accent);font-size:9px;font-weight:700;border-radius:4px;padding:2px 5px;white-space:nowrap}
.ping-good{color:var(--green)}.ping-mid{color:var(--yellow)}.ping-bad{color:var(--red)}
.search-bar{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.search-bar input{flex:1}
.refresh-indicator{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.refresh-indicator.active{background:var(--green);animation:pulse .5s}
/* CHAT */
.chat-toolbar{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.chat-toolbar-btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:11px;font-weight:600;padding:6px 10px;cursor:pointer;white-space:nowrap}
.chat-toolbar-btn.active{border-color:var(--accent);color:var(--accent)}
#chat-search{flex:1}
#chat-messages{display:flex;flex-direction:column;gap:5px;padding-bottom:70px}
.chat-msg{display:flex;gap:8px;align-items:flex-start}
.chat-msg.hidden{display:none}
.chat-avatar{width:26px;height:26px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:var(--accent)}
.chat-body{flex:1;min-width:0}
.chat-name{font-size:11px;font-weight:600;color:var(--accent)}
.chat-name.admin{color:var(--purple)}.chat-name.server{color:var(--text3);font-style:italic}
.chat-text{font-size:13px;word-break:break-word;margin-top:1px}
.chat-time{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
#chat-input-area{display:flex;gap:6px;position:fixed;bottom:calc(var(--safe-bot) + 50px);left:0;right:0;padding:8px 14px;background:linear-gradient(transparent,var(--bg) 40%)}
#chat-target,#chat-display-type{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:11px;padding:10px 6px;flex-shrink:0;-webkit-appearance:none;outline:none}
#chat-target{width:68px}#chat-display-type{width:58px}
#chat-text-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:10px 12px;outline:none}
#chat-text-input:focus{border-color:var(--accent)}
#btn-chat-send{background:var(--accent);border:none;border-radius:8px;color:#000;font-size:18px;width:42px;flex-shrink:0;cursor:pointer}
/* MAP */
.map-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.map-mode{font-size:12px;color:var(--text2)}
.map-name{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.map-scores{display:flex;gap:10px;margin-top:10px}
.team-score-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.ts-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.ts-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px}
.ts-val.t1{color:#60a5fa}.ts-val.t2{color:#f87171}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.stat-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:3px;color:var(--accent)}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.action-btn{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-family:'Inter',sans-serif}
.action-btn:active{opacity:.7}
.action-btn .ab-icon{font-size:20px}
.action-btn .ab-label{font-size:11px;font-weight:600;color:var(--text2)}
.action-btn.danger{border-color:rgba(239,68,68,.3)}.action-btn.danger .ab-label{color:var(--red)}
.action-btn.warning .ab-label{color:var(--yellow)}
.maplist-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:5px}
.maplist-num{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;width:20px;flex-shrink:0}
.maplist-name{font-size:13px;font-weight:500;flex:1}
.maplist-mode{font-size:11px;color:var(--text2)}
.maplist-current{border-color:var(--accent);background:rgba(232,160,32,.06)}
.maplist-badge{font-size:9px;font-weight:700;color:var(--accent);background:rgba(232,160,32,.15);border-radius:4px;padding:2px 5px;flex-shrink:0}
/* LISTAS */
.list-toolbar{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.list-toolbar input{flex:1}
.btn-sm{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--accent);font-size:12px;font-weight:600;padding:8px 12px;cursor:pointer;white-space:nowrap}
.btn-sm.danger{color:var(--red);border-color:rgba(239,68,68,.3)}
.list-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:5px}
.list-row-main{flex:1;min-width:0}
.list-row-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-row-sub{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.list-row-action{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0}
.list-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.list-tab{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text3);font-size:12px;font-weight:600;padding:7px 12px;cursor:pointer;white-space:nowrap}
.list-tab.active{border-color:var(--accent);color:var(--accent)}
/* PLUGINS */
.plugin-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.plugin-info{flex:1;min-width:0}
.plugin-name{font-size:13px;font-weight:500}
.plugin-ver{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{width:44px;height:24px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}
/* CONSOLE */
#console-log{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.8;color:var(--text2);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;min-height:200px;margin-bottom:10px;word-break:break-all}
.log-info{color:var(--text2)}.log-ok{color:var(--green)}.log-warn{color:var(--yellow)}.log-err{color:var(--red)}.log-cmd{color:var(--accent)}
#console-input-row{display:flex;gap:8px;position:sticky;bottom:0;background:var(--bg);padding:8px 0 4px}
#console-cmd{flex:1;font-family:'JetBrains Mono',monospace;font-size:12px}
#btn-console-send{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-size:14px;font-weight:700;padding:0 14px;cursor:pointer}
/* SHEETS */
#player-sheet,#reason-sheet,#input-sheet,#add-modal{position:fixed;inset:0;z-index:200;display:none}
#player-sheet.open,#reason-sheet.open,#input-sheet.open,#add-modal.open{display:block}
#player-sheet{z-index:200}#reason-sheet,#input-sheet{z-index:300}#add-modal{z-index:400}
.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px)}
.sheet-panel{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:18px 18px 0 0;border-top:1px solid var(--border);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:90vh;overflow-y:auto}
.sheet-panel.pad{padding:0 14px calc(var(--safe-bot) + 16px)}
.open .sheet-panel{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 14px}
.sheet-player-name{font-size:17px;font-weight:700;text-align:center;padding:0 20px 2px}
.sheet-player-sub{font-size:11px;color:var(--text3);text-align:center;padding-bottom:10px;border-bottom:1px solid var(--border);display:block;line-height:1.8}
.sheet-guid{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-align:center;padding:6px 14px;word-break:break-all}
.sheet-actions{padding:10px 14px 0;display:flex;flex-direction:column;gap:6px}
.sheet-action{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer}
.sheet-action:active{opacity:.7}
.sheet-action .sa-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.sheet-action .sa-label{font-size:14px;font-weight:500}
.sheet-action .sa-desc{font-size:11px;color:var(--text3);margin-top:1px}
.sheet-action.danger{border-color:rgba(239,68,68,.25)}.sheet-action.danger .sa-label{color:var(--red)}
.sheet-action.warn{border-color:rgba(234,179,8,.25)}.sheet-action.warn .sa-label{color:var(--yellow)}
.reason-title{font-size:14px;font-weight:600;padding:20px 0 14px;border-bottom:1px solid var(--border);margin-bottom:4px}
.reason-item{padding:14px 0;border-bottom:1px solid var(--border);font-size:14px;cursor:pointer;color:var(--text2)}
.reason-item:last-child{border-bottom:none}
.reason-item:active{color:var(--accent)}
.offline-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:10px;color:var(--text3);text-align:center}
.offline-icon{font-size:36px;opacity:.4}
.offline-text{font-size:13px;line-height:1.6}
#toast{position:fixed;top:calc(var(--safe-top) + 65px);left:50%;transform:translateX(-50%) translateY(-20px);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}
#toast.warn{border-color:var(--yellow);color:var(--yellow)}
#connecting-overlay{position:fixed;inset:0;background:rgba(10,12,16,.92);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(6px)}
#connecting-overlay.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.connecting-text{font-size:13px;color:var(--text2)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="server-dot" id="status-dot"></div>
    <div id="server-name">PRoCon Mobile</div>
    <div id="player-count"></div>
    <div class="refresh-indicator" id="refresh-dot" title="Auto-refresh"></div>
    <button class="top-btn" id="btn-reconnect" onclick="manualReconnect()">↺ Reconectar</button>
    <button class="top-btn" id="btn-lang" onclick="toggleLang()">EN</button>
    <button class="top-btn" id="btn-disconnect" onclick="disconnect()" style="display:none">✕</button>
  </div>

  <div id="content">
    <!-- CONECTAR -->
    <div class="screen active" id="screen-connect">
      <div class="logo">
        <div class="logo-text">PRoCon</div>
        <div class="logo-sub">Battlefield 4 · Admin Mobile · v2.1</div>
      </div>
      <div class="card">
        <div class="card-title">Servidor</div>
        <div class="field"><label>Host</label><input type="text" id="inp-host" class="input-mono" placeholder="server.example.com"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="field"><label>Porta RCON</label><input type="number" id="inp-port" class="input-mono" placeholder="30018"></div>
          <div class="field"><label>Jogo</label><select id="inp-game"><option value="BF4">BF4</option><option value="BF3">BF3</option></select></div>
        </div>
        <div class="field"><label>Usuário</label><input type="text" id="inp-user" class="input-mono" placeholder="admin" autocomplete="off" autocorrect="off" autocapitalize="none"></div>
        <div class="field"><label>Senha</label><input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password"></div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <input type="checkbox" id="inp-remember" style="width:auto;padding:0;flex-shrink:0">
          <label for="inp-remember" style="font-size:12px;color:var(--text2);text-transform:none;letter-spacing:0;cursor:pointer">Lembrar senha</label>
        </div>
        <button class="btn-primary" id="btn-connect" onclick="connectToServer()">Conectar</button>
      </div>
      <div class="section-label">Servidores Salvos</div>
      <div class="saved-servers" id="saved-list"></div>
    </div>

    <!-- JOGADORES -->
    <div class="screen" id="screen-players">
      <div class="search-bar">
        <input type="search" id="player-search" placeholder="🔍 Buscar jogador..." oninput="filterPlayers(this.value)">
      </div>
      <div class="players-table-wrap">
        <table class="players-table" id="players-table">
          <thead>
            <tr>
              <th onclick="sortPlayers('name')" id="th-name">Nome</th>
              <th onclick="sortPlayers('squad')" id="th-squad">Sq</th>
              <th onclick="sortPlayers('score')" id="th-score">Score</th>
              <th onclick="sortPlayers('kills')" id="th-kills">K</th>
              <th onclick="sortPlayers('deaths')" id="th-deaths">D</th>
              <th onclick="sortPlayers('kd')" id="th-kd">K/D</th>
              <th onclick="sortPlayers('ping')" id="th-ping">Ping</th>
              <th onclick="sortPlayers('rank')" id="th-rank">Rank</th>
              <th>VIP</th>
            </tr>
          </thead>
          <tbody id="players-tbody">
            <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text3)">Conecte ao servidor para ver os jogadores</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- CHAT -->
    <div class="screen" id="screen-chat">
      <div class="chat-toolbar">
        <button class="chat-toolbar-btn active" id="btn-chat-pause" onclick="toggleChatPause()">⏸ Pausar</button>
        <input type="search" id="chat-search" placeholder="🔍 Buscar..." oninput="filterChat(this.value)">
        <button class="chat-toolbar-btn" onclick="clearChat()">🗑️</button>
      </div>
      <div id="chat-messages"></div>

<script>
const PROXY_URL = 'wss://judges-delight-corners-invite.trycloudflare.com';
const REASONS = ["Hack/Trapaça","Abuso de admin","Liberar vaga para membros","Desrespeito","Team Kill","Spawn Kill","Atacar base inimiga","Equilíbrio de equipes","Troca para time vencedor"];
const SQUADS = ['','A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P'];
const MAP_NAMES = {"MP_Abandoned":"Zavod 311","MP_Damage":"Barragem Lancang","MP_Flooded":"Zona de Inundação","MP_Journey":"Ferrovia Golmud","MP_Naval":"Tempestade Paracel","MP_Prison":"Cofre Operação","MP_Resort":"Resort Hainan","MP_Siege":"Cerco de Xangai","MP_TheDish":"Transmissão Pirata","MP_Tremors":"Amanhecer","XP1_001":"Silk Road","XP1_002":"Altai Range","XP1_003":"Guilin Peaks","XP1_004":"Dragon Pass","XP0_Caspian":"Caspian Border 2014","XP0_Firestorm":"Op. Firestorm 2014","XP0_Metro":"Metro 2014","XP0_Oman":"Gulf of Oman 2014"};
const MODE_NAMES = {"ConquestLarge0":"Conquista Grande","ConquestSmall0":"Conquista Pequena","RushLarge0":"Ataque","SquadDeathMatch0":"Mata-mata Esquadrão","TeamDeathMatch0":"Mata-mata Time","Domination0":"Dominação","Obliteration":"Obliteração","AirSuperiority0":"Superioridade Aérea","CaptureTheFlag0":"Captura a Bandeira","CarrierAssaultLarge0":"Ataque Porta-aviões","Chainlink0":"Corrente de Mando"};

let lang = localStorage.getItem('procon_lang') || 'pt';

function toggleLang() {
  lang = lang === 'pt' ? 'en' : 'pt';
  localStorage.setItem('procon_lang', lang);
  document.getElementById('btn-lang').textContent = lang === 'pt' ? 'EN' : 'PT';
  renderPlayers();
  renderMap();
}

const S = {
  ws:null, connected:false, host:'', port:0, pass:'', user:'admin',
  serverName:'', players:[], mapName:'', modeName:'', scores:{team1:0,team2:0},
  maxPlayers:32, mapList:[], currentMapIdx:0,
  bans:[], reserved:[], plugins:[],
  selectedPlayer:null, pendingAction:null, pendingInputAction:null,
  chatPaused:false, chatUnread:0,
  reconnectTimer:null, heartbeatTimer:null, refreshTimer:null,
  sortCol:'score', sortDir:-1, filterQ:'',
  currentListTab:'bans', addModalTarget:null,
};

// ── NAVIGATION ──────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  const nb = document.getElementById('nav-'+name);
  if (nb) nb.classList.add('active');
  if (name==='chat'){S.chatUnread=0;updateBadge('chat',0);scrollChat();}
  if (name==='lists') renderListTab();
  if (name==='plugins') renderPlugins();
  if (name==='players') renderPlayers();
}

// ── TOAST ───────────────────────────────────────────
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(type||'');
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='toast',2800);
}

// ── SAVED SERVERS ───────────────────────────────────
function getSaved(){try{return JSON.parse(localStorage.getItem('procon_v2')||'[]');}catch{return[];}}
function saveServer(host,port,game,pass){
  const list=getSaved().filter(s=>!(s.host===host&&s.port===port));
  const remember=document.getElementById('inp-remember').checked;
  list.unshift({host,port,game,name:S.serverName||host,pass:remember?pass:'',ts:Date.now()});
  localStorage.setItem('procon_v2',JSON.stringify(list.slice(0,5)));
  renderSaved();
}
function renderSaved(){
  const list=getSaved(), el=document.getElementById('saved-list');
  if(!list.length){el.innerHTML='<div style="color:var(--text3);font-size:12px;text-align:center;padding:10px">Nenhum servidor salvo</div>';return;}
  el.innerHTML=list.map((s,i)=>`
    <div class="saved-row" onclick="loadSaved(${i})">
      <div style="flex:1"><div class="sr-name">${s.name||s.host}</div><div class="sr-host">${s.host}:${s.port} · ${s.game||'BF4'}</div></div>
      <div style="color:var(--text3);font-size:16px;padding:4px" onclick="deleteSaved(event,${i})">🗑️</div>
    </div>`).join('');
}
function loadSaved(i){
  const s=getSaved()[i]; if(!s)return;
  document.getElementById('inp-host').value=s.host;
  document.getElementById('inp-port').value=s.port;
  document.getElementById('inp-game').value=s.game||'BF4';
  if(s.pass){document.getElementById('inp-pass').value=s.pass;document.getElementById('inp-remember').checked=true;}
  else document.getElementById('inp-pass').focus();
}
function deleteSaved(e,i){
  e.stopPropagation();
  const list=getSaved(); list.splice(i,1);
  localStorage.setItem('procon_v2',JSON.stringify(list)); renderSaved();
}

// ── CONNECTION ──────────────────────────────────────
function connectToServer(){
  const host=document.getElementById('inp-host').value.trim();
  const port=parseInt(document.getElementById('inp-port').value.trim());
  const user=document.getElementById('inp-user').value.trim()||'admin';
  const pass=document.getElementById('inp-pass').value;
  const game=document.getElementById('inp-game').value;
  if(!host||!port){toast('Preencha host e porta','error');return;}
  if(!pass){toast('Digite a senha','error');return;}
  S.host=host;S.port=port;S.pass=pass;S.user=user;
  doConnect();
}

function doConnect(){
  clearTimers();
  showConnecting('Conectando ao proxy...');
  logConsole(`→ ${S.host}:${S.port}`,'info');
  if(S.ws){try{S.ws.close();}catch{}}
  const ws=new WebSocket(PROXY_URL); S.ws=ws;

  ws.onopen=()=>{
    showConnecting('Autenticando...');
    startHeartbeat();
    ws.send(JSON.stringify({type:'connect',host:S.host,port:S.port,username:S.user,pass:S.pass}));
  };
  ws.onmessage=e=>{try{handleMsg(JSON.parse(e.data));}catch(err){console.error(err);}};
  ws.onerror=()=>{
    hideConnecting();
    updateTopBar(false);
    toast('Proxy inacessível','error');
    logConsole('Erro WebSocket','err');
    document.getElementById('btn-connect').disabled=false;
    document.getElementById('btn-reconnect').style.display='block';
    scheduleReconnect();
  };
  ws.onclose=()=>{
    clearTimers();
    if(S.connected){
      S.connected=false;
      updateTopBar(false);
      logConsole('Conexão perdida','err');
      toast('Desconectado','error');
      document.getElementById('btn-reconnect').style.display='block';
      scheduleReconnect();
    }
    hideConnecting();
  };
  setTimeout(()=>{
    if(ws.readyState!==WebSocket.OPEN){
      hideConnecting();toast('Timeout','error');
      document.getElementById('btn-connect').disabled=false;
    }
  },15000);
}

function disconnect(){
  clearTimers();
  if(S.ws){try{S.ws.close();}catch{}S.ws=null;}
  S.connected=false;S.players=[];
  updateTopBar(false);showScreen('connect');toast('Desconectado');
  document.getElementById('btn-reconnect').style.display='none';
}

function manualReconnect(){
  document.getElementById('btn-reconnect').style.display='none';
  if(S.host) doConnect();
  else showScreen('connect');
}

function scheduleReconnect(){
  clearTimeout(S.reconnectTimer);
  S.reconnectTimer=setTimeout(()=>{
    if(!S.connected&&S.host){
      logConsole('Reconectando...','warn');
      doConnect();
    }
  },8000);
}

function startHeartbeat(){
  clearInterval(S.heartbeatTimer);
  S.heartbeatTimer=setInterval(()=>{
    if(S.ws&&S.ws.readyState===WebSocket.OPEN){
      S.ws.send(JSON.stringify({type:'cmd',cmd:'version',args:[]}));
    }
  },30000);
}

function startAutoRefresh(){
  clearInterval(S.refreshTimer);
  S.refreshTimer=setInterval(()=>{
    if(!S.connected||!S.ws||S.ws.readyState!==WebSocket.OPEN) return;
    const dot=document.getElementById('refresh-dot');
    dot.classList.add('active');
    setTimeout(()=>dot.classList.remove('active'),500);
    S.ws.send(JSON.stringify({type:'refresh',what:'players'}));
    S.ws.send(JSON.stringify({type:'refresh',what:'serverInfo'}));
  },10000);
}

function clearTimers(){
  clearTimeout(S.reconnectTimer);
  clearInterval(S.heartbeatTimer);
  clearInterval(S.refreshTimer);
}

function showConnecting(msg){
  document.getElementById('connecting-text').textContent=msg;
  document.getElementById('connecting-overlay').classList.add('show');
  document.getElementById('btn-connect').disabled=true;
}
function hideConnecting(){
  document.getElementById('connecting-overlay').classList.remove('show');
  document.getElementById('btn-connect').disabled=false;
}

// ── MESSAGE HANDLER ─────────────────────────────────
function handleMsg(msg){
  switch(msg.type){
    case 'connected':
      hideConnecting();S.connected=true;S.serverName=msg.serverName||S.host;
      updateTopBar(true);
      saveServer(S.host,S.port,document.getElementById('inp-game').value,S.pass);
      showScreen('players');toast('Conectado! 🎮','success');
      logConsole('✓ '+S.serverName,'ok');
      startAutoRefresh();
      document.getElementById('btn-reconnect').style.display='none';
      break;
    case 'error':
      hideConnecting();toast(msg.message,'error');logConsole('✗ '+msg.message,'err');
      document.getElementById('btn-connect').disabled=false;
      break;
    case 'players':
      S.players=msg.players||[];renderPlayers();
      updateBadge('players',S.players.length);
      document.getElementById('player-count').textContent=`${S.players.length}/${S.maxPlayers||32}`;
      break;
    case 'chat':
      if(!S.chatPaused) addChat(msg.player,msg.text,msg.subset,msg.isAdmin);
      break;
    case 'serverInfo':
      if(msg.serverName)S.serverName=msg.serverName;
      if(msg.mapName)S.mapName=msg.mapName;
      if(msg.modeName)S.modeName=msg.modeName;
      if(msg.scores)S.scores=msg.scores;
      if(msg.maxPlayers)S.maxPlayers=msg.maxPlayers;
      renderMap();break;
    case 'mapList':
      S.mapList=msg.maps||[];S.currentMapIdx=msg.currentIdx||0;renderMap();break;
    case 'banList':
      S.bans=msg.bans||[];if(S.currentListTab==='bans')renderListTab();break;
    case 'reservedSlots':
      S.reserved=msg.slots||[];if(S.currentListTab==='reserved')renderListTab();break;
    case 'plugins':
      S.plugins=msg.plugins||[];renderPlugins();break;
    case 'cmdResult':
      logConsole((msg.ok?'✓ ':'✗ ')+msg.result,msg.ok?'ok':'err');break;
    case 'event':
      if(msg.event==='levelLoaded'){S.mapName=msg.map||S.mapName;S.modeName=msg.mode||S.modeName;renderMap();}
      break;
  }
}

function sendCmd(cmd,...args){
  if(!S.ws||S.ws.readyState!==WebSocket.OPEN){toast('Não conectado','error');return;}
  S.ws.send(JSON.stringify({type:'cmd',cmd,args}));
}

// ── TOP BAR ─────────────────────────────────────────
function updateTopBar(online){
  document.getElementById('status-dot').className='server-dot '+(online?'online':'offline');
  document.getElementById('server-name').textContent=online?S.serverName:'PRoCon Mobile';
  document.getElementById('btn-disconnect').style.display=online?'block':'none';
  if(!online){document.getElementById('player-count').textContent='';updateBadge('players',0);}
}
function updateBadge(id,n){
  const el=document.getElementById('badge-'+id);if(!el)return;
  el.textContent=n;el.classList.toggle('show',n>0);
}

// ── PLAYERS TABLE ───────────────────────────────────
let sortCol='score', sortDir=-1;

function sortPlayers(col){
  if(sortCol===col) sortDir*=-1;
  else {sortCol=col;sortDir=-1;}
  document.querySelectorAll('.players-table th').forEach(th=>{
    th.classList.remove('sort-asc','sort-desc');
    if(th.id==='th-'+col) th.classList.add(sortDir===1?'sort-asc':'sort-desc');
  });
  renderPlayers(S.filterQ);
}

function filterPlayers(q){S.filterQ=q;renderPlayers(q);}

function renderPlayers(filter){
  const tbody=document.getElementById('players-tbody');
  if(!S.players.length){
    tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text3)">Nenhum jogador online</td></tr>';
    return;
  }
  const q=(filter||S.filterQ||'').toLowerCase();
  const all=q?S.players.filter(p=>p.name.toLowerCase().includes(q)):S.players;
  const t1=all.filter(p=>p.team===1);
  const t2=all.filter(p=>p.team===2);

  function sortArr(arr){
    return [...arr].sort((a,b)=>{
      let va,vb;
      if(sortCol==='name'){va=a.name.toLowerCase();vb=b.name.toLowerCase();}
      else if(sortCol==='squad'){va=a.squad;vb=b.squad;}
      else if(sortCol==='kd'){va=a.deaths>0?a.kills/a.deaths:a.kills;vb=b.deaths>0?b.kills/b.deaths:b.kills;}
      else{va=a[sortCol]||0;vb=b[sortCol]||0;}
      return sortDir*(va>vb?1:va<vb?-1:0);
    });
  }

  function teamRows(arr, num){
    if(!arr.length) return '';
    const sorted=sortArr(arr);
    const tickets=S.scores?.(num===1?S.scores.team1:S.scores.team2)||0;
    const teamLabel=num===1?'🔵 US Army':'🔴 Russian Army';
    const cls=num===2?'team2':'';
    let rows=`<tr class="team-header-row ${cls}"><td colspan="9">${teamLabel}${tickets?' — '+tickets+' Tickets':''}</td></tr>`;

    let totK=0,totD=0,totS=0,totP=0,totR=0;
    sorted.forEach(p=>{
      const kd=p.deaths>0?(p.kills/p.deaths).toFixed(2):'∞';
      const pc=p.ping<80?'ping-good':p.ping<150?'ping-mid':'ping-bad';
      const sq=SQUADS[p.squad||0]||'?';
      const vip=p.type&&p.type!=='0'&&p.type!==''?`<span class="vip-badge">VIP</span>`:'';
      const pd=encodeURIComponent(JSON.stringify({name:p.name,guid:p.guid||'',team:p.team,squad:p.squad,score:p.score,kills:p.kills,deaths:p.deaths,ping:p.ping,rank:p.rank}));
      totK+=p.kills;totD+=p.deaths;totS+=p.score;totP+=p.ping;totR+=p.rank||0;
      rows+=`<tr onclick="openPlayerSheet('${pd}')" style="cursor:pointer">
        <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis">${p.name}</td>
        <td>${sq}</td>
        <td style="color:var(--accent);font-family:'JetBrains Mono',monospace">${p.score}</td>
        <td>${p.kills}</td>
        <td>${p.deaths}</td>
        <td style="font-family:'JetBrains Mono',monospace">${kd}</td>
        <td class="${pc}">${p.ping}</td>
        <td>${p.rank||'?'}</td>
        <td>${vip}</td>
      </tr>`;
    });
    const n=sorted.length;
    const avgKD=totD>0?(totK/totD).toFixed(2):'∞';
    const avgP=n?Math.round(totP/n):0;
    rows+=`<tr class="averages-row"><td>Médias</td><td></td><td>${n?Math.round(totS/n):0}</td><td>${n?(totK/n).toFixed(1):0}</td><td>${n?(totD/n).toFixed(1):0}</td><td>${avgKD}</td><td>${avgP}</td><td></td><td></td></tr>`;
    rows+=`<tr class="totals-row"><td>Totais (${n})</td><td></td><td>${totS}</td><td>${totK}</td><td>${totD}</td><td>${totD>0?(totK/totD).toFixed(2):'∞'}</td><td></td><td></td><td></td></tr>`;
    return rows;
  }

  tbody.innerHTML=teamRows(t1,1)+teamRows(t2,2);
}

// ── PLAYER SHEET ────────────────────────────────────
function openPlayerSheet(pd){
  const p=JSON.parse(decodeURIComponent(pd));
  S.selectedPlayer=p;
  document.getElementById('ps-name').textContent=p.name;
  const kd=p.deaths>0?(p.kills/p.deaths).toFixed(2):'∞';
  document.getElementById('ps-sub').innerHTML=`Score: ${p.score} &nbsp; K/D: ${kd} (${p.kills}/${p.deaths})<br>Ping: ${p.ping}ms &nbsp; Rank: ${p.rank||'?'} &nbsp; ${p.team===1?'🔵 US':'🔴 RU'}`;
  document.getElementById('ps-guid').textContent=p.guid?`GUID: ${p.guid}`:'';
  document.getElementById('ps-actions').innerHTML=`
    <div class="sheet-action" onclick="playerAction('kill')"><div class="sa-icon">💀</div><div><div class="sa-label">Matar</div><div class="sa-desc">Mata o jogador uma vez</div></div></div>
    <div class="sheet-action" onclick="playerAction('kick')"><div class="sa-icon">👢</div><div><div class="sa-label">Expulsar</div><div class="sa-desc">Remove do servidor</div></div></div>
    <div class="sheet-action" onclick="playerAction('move')"><div class="sa-icon">🔄</div><div><div class="sa-label">Mover Time</div><div class="sa-desc">Troca para o outro time</div></div></div>
    <div class="sheet-action warn" onclick="openReasonSheet('tban')"><div class="sa-icon">⏱️</div><div><div class="sa-label">Ban Temporário</div><div class="sa-desc">Ban por 60 minutos</div></div></div>
    <div class="sheet-action danger" onclick="openReasonSheet('ban')"><div class="sa-icon">🚫</div><div><div class="sa-label">Ban Permanente</div><div class="sa-desc">Selecionar motivo</div></div></div>
    <div class="sheet-action" onclick="openInputSheet('say')"><div class="sa-icon">💬</div><div><div class="sa-label">Mensagem Privada</div><div class="sa-desc">Say apenas para este jogador</div></div></div>
    <div class="sheet-action" onclick="openInputSheet('yell')"><div class="sa-icon">📢</div><div><div class="sa-label">Grito Privado</div><div class="sa-desc">Yell apenas para este jogador</div></div></div>`;
  document.getElementById('player-sheet').classList.add('open');
}
function closePlayerSheet(){document.getElementById('player-sheet').classList.remove('open');}

function playerAction(action){
  const p=S.selectedPlayer; if(!p)return;
  closePlayerSheet();
  switch(action){
    case 'kill': sendCmd('admin.killPlayer',p.name);toast(`💀 ${p.name}`);logConsole(`admin.killPlayer ${p.name}`,'cmd');break;
    case 'kick': sendCmd('admin.kickPlayer',p.name,'Expulso pelo admin');toast(`👢 ${p.name}`);logConsole(`admin.kickPlayer ${p.name}`,'cmd');break;
    case 'move': const tm=p.team===1?2:1;sendCmd('admin.movePlayer',p.name,String(tm),'0','true');toast(`🔄 ${p.name} → Time ${tm}`);logConsole(`movePlayer ${p.name} ${tm}`,'cmd');break;
  }
}

function openReasonSheet(action){
  S.pendingAction=action;closePlayerSheet();
  document.getElementById('rs-title').textContent=action==='ban'?'🚫 Ban Permanente — Motivo':'⏱️ Ban Temp — Motivo';
  document.getElementById('rs-list').innerHTML=REASONS.map(r=>`<div class="reason-item" onclick="applyBan('${r}')">${r}</div>`).join('');
  document.getElementById('reason-sheet').classList.add('open');
}
function closeReasonSheet(){document.getElementById('reason-sheet').classList.remove('open');}

function applyBan(reason){
  const p=S.selectedPlayer,action=S.pendingAction;
  closeReasonSheet();if(!p)return;
  if(action==='ban'){
    sendCmd('banList.add','name',p.name,'perm','0','0',reason);
    sendCmd('admin.kickPlayer',p.name,reason);
    toast(`🚫 ${p.name}`,'error');logConsole(`Ban perm: ${p.name}`,'err');
  } else {
    sendCmd('banList.add','name',p.name,'seconds','3600','0',reason);
    sendCmd('admin.kickPlayer',p.name,reason);
    toast(`⏱️ ${p.name} (60min)`);logConsole(`Ban temp: ${p.name}`,'warn');
  }
}

function openInputSheet(action){
  S.pendingInputAction=action;closePlayerSheet();
  const p=S.selectedPlayer;
  document.getElementById('is-title').textContent=(action==='say'?'💬 Mensagem para ':'📢 Grito para ')+(p?p.name:'');
  document.getElementById('is-input').value='';
  document.getElementById('input-sheet').classList.add('open');
  setTimeout(()=>document.getElementById('is-input').focus(),300);
}
function closeInputSheet(){document.getElementById('input-sheet').classList.remove('open');}
function submitInputSheet(){
  const text=document.getElementById('is-input').value.trim();
  const p=S.selectedPlayer;const action=S.pendingInputAction;
  closeInputSheet();if(!text||!p)return;
  if(action==='say'){sendCmd('admin.say',text,'player',p.name);toast(`💬 → ${p.name}`);}
  else{sendCmd('admin.yell',text,'10000','player',p.name);toast(`📢 → ${p.name}`);}
  logConsole(`${action} "${text}" → ${p.name}`,'cmd');
}
document.getElementById('is-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitInputSheet();});

// ── CHAT ────────────────────────────────────────────
function addChat(player,text,subset,isAdmin){
  const el=document.getElementById('chat-messages');
  const time=new Date().toTimeString().slice(0,5);
  const nc=isAdmin?'admin':(player==='Server'||player==='SERVER'?'server':'');
  const init=player.replace(/\[.*?\]/g,'')[0]?.toUpperCase()||'?';
  const q=document.getElementById('chat-search').value.toLowerCase();
  const hidden=(q&&!player.toLowerCase().includes(q)&&!text.toLowerCase().includes(q))?'hidden':'';
  const div=document.createElement('div');
  div.className=`chat-msg ${hidden}`;
  div.dataset.player=player.toLowerCase();div.dataset.text=text.toLowerCase();
  div.innerHTML=`<div class="chat-avatar">${init}</div><div class="chat-body"><div class="chat-name ${nc}">${player}</div><div class="chat-text">${text}</div><div class="chat-time">${time} · ${subset||'All'}</div></div>`;
  el.appendChild(div);
  if(el.children.length>600) el.removeChild(el.firstChild);
  if(!document.getElementById('screen-chat').classList.contains('active')){S.chatUnread++;updateBadge('chat',S.chatUnread);}
  else scrollChat();
}
function scrollChat(){const el=document.getElementById('screen-chat');setTimeout(()=>el.scrollTop=el.scrollHeight,50);}
function toggleChatPause(){
  S.chatPaused=!S.chatPaused;
  const btn=document.getElementById('btn-chat-pause');
  btn.classList.toggle('active',!S.chatPaused);
  btn.textContent=S.chatPaused?'▶ Retomar':'⏸ Pausar';
}
function filterChat(q){
  const ql=q.toLowerCase();
  document.querySelectorAll('#chat-messages .chat-msg').forEach(el=>{
    el.classList.toggle('hidden',!(!ql||el.dataset.player.includes(ql)||el.dataset.text.includes(ql)));
  });
}
function clearChat(){document.getElementById('chat-messages').innerHTML='';toast('Chat limpo');}
function sendChat(){
  const target=document.getElementById('chat-target').value;
  const dtype=document.getElementById('chat-display-type').value;
  const text=document.getElementById('chat-text-input').value.trim();
  if(!text)return;
  if(dtype==='yell') sendCmd('admin.yell',text,'10000',target==='all'?'all':'team',target==='all'?'all':target.split(' ')[1]);
  else sendCmd('admin.say',text,target);
  addChat('[Admin]',text,target,true);
  document.getElementById('chat-text-input').value='';
  logConsole(`${dtype} "${text}" ${target}`,'cmd');
}
document.getElementById('chat-text-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});

// ── MAP ─────────────────────────────────────────────
function renderMap(){
  const el=document.getElementById('map-content');
  const map=MAP_NAMES[S.mapName]||S.mapName||'—';
  const mode=MODE_NAMES[S.modeName]||S.modeName||'—';
  const t1=S.scores.team1||0,t2=S.scores.team2||0;
  const tc1=S.players.filter(p=>p.team===1).length;
  const tc2=S.players.filter(p=>p.team===2).length;
  const maplistHtml=S.mapList.length
    ?S.mapList.map((m,i)=>`<div class="maplist-row ${i===S.currentMapIdx?'maplist-current':''}"><span class="maplist-num">${i+1}</span><div><div class="maplist-name">${MAP_NAMES[m.map]||m.map}</div><div class="maplist-mode">${MODE_NAMES[m.mode]||m.mode}</div></div>${i===S.currentMapIdx?'<span class="maplist-badge">▶ NOW</span>':''}</div>`).join('')
    :'<div style="color:var(--text3);font-size:12px">Nenhum mapa na rotação</div>';
  el.innerHTML=`
    <div class="map-card">
      <div class="map-mode">${mode}</div>
      <div class="map-name">${map}</div>
      <div class="map-scores">
        <div class="team-score-box"><div class="ts-label">🔵 US</div><div class="ts-val t1">${t1}</div></div>
        <div class="team-score-box"><div class="ts-label">🔴 RU</div><div class="ts-val t2">${t2}</div></div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">Jogadores</div><div class="stat-val">${S.players.length}/${S.maxPlayers}</div></div>
      <div class="stat-box"><div class="stat-label">Equilíbrio</div><div class="stat-val">${tc1}v${tc2}</div></div>
    </div>
    <div class="section-label">Ações do Servidor</div>
    <div class="action-grid">
      <div class="action-btn warning" onclick="srvAction('next')"><div class="ab-icon">⏭️</div><div class="ab-label">Próximo Mapa</div></div>
      <div class="action-btn warning" onclick="srvAction('restart')"><div class="ab-icon">🔄</div><div class="ab-label">Reiniciar Round</div></div>
      <div class="action-btn danger" onclick="srvAction('end1')"><div class="ab-icon">🔵</div><div class="ab-label">Encerrar (US)</div></div>
      <div class="action-btn danger" onclick="srvAction('end2')"><div class="ab-icon">🔴</div><div class="ab-label">Encerrar (RU)</div></div>
    </div>
    <div class="section-label">Rotação de Mapas</div>
    ${maplistHtml}`;
}
function srvAction(a){
  const labels={next:'Trocar para o próximo mapa?',restart:'Reiniciar o round?',end1:'Encerrar — US vence?',end2:'Encerrar — RU vence?'};
  if(!confirm(labels[a]))return;
  switch(a){
    case 'next':sendCmd('mapList.runNextRound');toast('Trocando mapa...');break;
    case 'restart':sendCmd('mapList.restartRound');toast('Reiniciando...');break;
    case 'end1':sendCmd('mapList.endRound','1');toast('Round encerrado — US vence');break;
    case 'end2':sendCmd('mapList.endRound','2');toast('Round encerrado — RU vence');break;
  }
}

// ── LISTAS ──────────────────────────────────────────
function showListTab(tab){
  S.currentListTab=tab;
  document.querySelectorAll('.list-tab').forEach((el,i)=>{
    el.classList.toggle('active',['bans','reserved','spectator'][i]===tab);
  });
  renderListTab();
}
function renderListTab(){
  const el=document.getElementById('list-content');
  if(S.currentListTab==='bans'){
    el.innerHTML=`<div class="list-toolbar"><input type="search" placeholder="🔍..." oninput="filterList(this.value)"><button class="btn-sm danger" onclick="if(confirm('Limpar todos os bans?'))sendCmd('banList.clear')">Limpar Tudo</button></div>`+
      (S.bans.length?S.bans.map((b,i)=>`<div class="list-row"><div class="list-row-main"><div class="list-row-name">${b.id}</div><div class="list-row-sub">${b.idType} · ${b.banType} · ${b.reason||'—'}</div></div><button class="list-row-action" onclick="unbanPlayer('${b.idType}','${b.id}')">🔓</button></div>`).join('')
      :'<div class="offline-state"><div class="offline-icon">🚫</div><div class="offline-text">Nenhum ban registrado</div></div>');
  } else if(S.currentListTab==='reserved'){
    el.innerHTML=`<div class="list-toolbar"><input type="search" placeholder="🔍..." oninput="filterList(this.value)"><button class="btn-sm" onclick="openAddModal('reserved')">+ Adicionar</button></div>`+
      (S.reserved.length?S.reserved.map(s=>`<div class="list-row"><div class="list-row-main"><div class="list-row-name">${s}</div></div><button class="list-row-action" onclick="removeReserved('${s}')">🗑️</button></div>`).join('')
      :'<div class="offline-state"><div class="offline-icon">🎫</div><div class="offline-text">Nenhum slot reservado</div></div>');
  } else {
    el.innerHTML=`<div class="list-toolbar"><input type="search" placeholder="🔍..."><button class="btn-sm" onclick="openAddModal('spectator')">+ Adicionar</button></div><div class="offline-state"><div class="offline-icon">👁️</div><div class="offline-text">Nenhum espectador reservado</div></div>`;
  }
}
function filterList(q){
  const ql=q.toLowerCase();
  document.querySelectorAll('#list-content .list-row').forEach(el=>{
    const n=el.querySelector('.list-row-name')?.textContent.toLowerCase()||'';
    el.style.display=(!ql||n.includes(ql))?'':'none';
  });
}
function unbanPlayer(type,id){
  if(!confirm(`Desbanir ${id}?`))return;
  sendCmd('banList.remove',type,id);toast(`🔓 ${id}`);
  setTimeout(()=>S.ws&&S.ws.send(JSON.stringify({type:'refresh',what:'bans'})),500);
}
function removeReserved(name){
  if(!confirm(`Remover ${name}?`))return;
  sendCmd('reservedSlotsList.remove',name);toast('Slot removido');
  setTimeout(()=>S.ws&&S.ws.send(JSON.stringify({type:'refresh',what:'reserved'})),500);
}
function openAddModal(target){
  S.addModalTarget=target;
  document.getElementById('am-title').textContent=target==='reserved'?'Adicionar Slot Reservado':'Adicionar Espectador';
  document.getElementById('am-input').value='';
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('am-input').focus(),300);
}
function closeAddModal(){document.getElementById('add-modal').classList.remove('open');}
function submitAddModal(){
  const name=document.getElementById('am-input').value.trim();
  closeAddModal();if(!name)return;
  if(S.addModalTarget==='reserved'){sendCmd('reservedSlotsList.add',name);toast('Slot adicionado');setTimeout(()=>S.ws&&S.ws.send(JSON.stringify({type:'refresh',what:'reserved'})),500);}
  else{sendCmd('spectatorList.add',name);toast('Slot adicionado');}
}
document.getElementById('am-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitAddModal();});

// ── PLUGINS ─────────────────────────────────────────
function renderPlugins(){
  const el=document.getElementById('plugins-list');
  if(!S.plugins.length){el.innerHTML='<div class="offline-state"><div class="offline-icon">🔌</div><div class="offline-text">Conecte para ver os plugins</div></div>';return;}
  el.innerHTML=S.plugins.map((p,i)=>`<div class="plugin-row"><div class="plugin-info"><div class="plugin-name">${p.name}</div><div class="plugin-ver">v${p.version}</div></div><button class="toggle ${p.enabled?'on':''}" onclick="togglePlugin(${i})"></button></div>`).join('');
}
function togglePlugin(i){
  const p=S.plugins[i];if(!p)return;
  const cmd=p.enabled?'procon.plugin.disable':'procon.plugin.enable';
  sendCmd(cmd,p.name);S.plugins[i].enabled=!p.enabled;renderPlugins();
  toast(`${p.name} ${p.enabled?'desabilitado':'habilitado'}`);logConsole(`${cmd} ${p.name}`,'cmd');
}
function refreshPlugins(){
  if(!S.ws)return;
  S.ws.send(JSON.stringify({type:'refresh',what:'plugins'}));toast('Atualizando...');
}

// ── CONSOLE ─────────────────────────────────────────
function logConsole(msg,type='info'){
  const el=document.getElementById('console-log');
  const span=document.createElement('span');
  span.className='log-'+type;
  span.textContent=`[${new Date().toTimeString().slice(0,8)}] ${msg}`;
  el.appendChild(span);el.appendChild(document.createElement('br'));
  el.scrollTop=el.scrollHeight;
  if(el.children.length>200){el.removeChild(el.firstChild);el.removeChild(el.firstChild);}
}
function sendConsoleCmd(){
  const input=document.getElementById('console-cmd');
  const raw=input.value.trim();if(!raw)return;
  input.value='';logConsole('> '+raw,'cmd');
  const parts=raw.match(/(?:[^\s"]+|"[^"]*")+/g)||[];
  sendCmd(parts[0],...parts.slice(1).map(a=>a.replace(/^"|"$/g,'')));
}
document.getElementById('console-cmd').addEventListener('keydown',e=>{if(e.key==='Enter')sendConsoleCmd();});

// ── INIT ────────────────────────────────────────────
document.getElementById('btn-lang').textContent = lang==='pt'?'EN':'PT';
renderSaved();
</script>
